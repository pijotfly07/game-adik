<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jom Belajar</title>
<style>
body{font-family:Arial;background:#EAF7FF;margin:0;text-align:center}
header{background:#4FC3F7;color:#fff;padding:16px;font-size:28px;font-weight:bold}
#card{max-width:500px;margin:20px auto;background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 12px #bbb}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:20px}
button.choice{font-size:70px;padding:15px;border:none;border-radius:18px;background:#F7F7F7;cursor:pointer}
button.choice:hover{background:#FFE082}
#msg{font-size:26px;height:40px;margin:15px}
.info{display:flex;justify-content:space-between}
#next{display:none;padding:12px 24px;font-size:18px}
</style>
</head>
<body>
<header>🎈 Jom Belajar Bersama</header>
<div id="card">
<div class="info"><span>⭐ <span id="score">0</span></span><span>Soalan <span id="num">1</span>/5</span></div>
<h2 id="q"></h2>
<div class="grid" id="grid"></div>
<div id="msg"></div>
<button id="next">Soalan Seterusnya</button>
</div>
<script>
const data=[
{t:'Cari Kucing',s:'Cari kucing',a:'🐱',o:['🐱','🐶','🐰','🐻']},
{t:'Cari Epal',s:'Cari epal',a:'🍎',o:['🍎','🍌','🍇','🍊']},
{t:'Cari Warna Merah',s:'Cari warna merah',a:'🔴',o:['🔴','🔵','🟢','🟡']},
{t:'Cari Gajah',s:'Cari gajah',a:'🐘',o:['🐘','🐵','🦁','🐭']},
{t:'Cari Bola',s:'Cari bola',a:'⚽',o:['⚽','🏀','🎾','🏈']}
];
let i=0,score=0;
const synth=window.speechSynthesis;
function cakap(txt){
 if(!('speechSynthesis' in window)) return;
 synth.cancel();
 const u=new SpeechSynthesisUtterance(txt);
 u.lang='ms-MY';
 synth.speak(u);
}
function beep(freq,dur){
 const ctx=new (window.AudioContext||window.webkitAudioContext)();
 const osc=ctx.createOscillator(); const gain=ctx.createGain();
 osc.frequency.value=freq; osc.connect(gain); gain.connect(ctx.destination);
 osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
 osc.stop(ctx.currentTime+dur);
}
function load(){
document.getElementById('msg').textContent='';
document.getElementById('next').style.display='none';
let q=data[i];
document.getElementById('q').textContent=q.t;
document.getElementById('num').textContent=i+1;
let arr=[...q.o].sort(()=>Math.random()-0.5);
let g=document.getElementById('grid');g.innerHTML='';
arr.forEach(x=>{
 let b=document.createElement('button');
 b.className='choice'; b.textContent=x;
 b.onclick=()=>ans(x);
 g.appendChild(b);
});
cakap(q.s);
}
function ans(v){
 if(v===data[i].a){
  score++; document.getElementById('score').textContent=score;
  document.getElementById('msg').textContent='🎉 Betul!';
  cakap('Tahniah. Betul!');
  beep(800,.2);
 }else{
  document.getElementById('msg').textContent='😊 Cuba lagi!';
  cakap('Cuba lagi');
  beep(300,.3);
 }
 document.getElementById('next').style.display='inline-block';
}
document.getElementById('next').onclick=()=>{
 i++;
 if(i>=data.length){
   document.getElementById('card').innerHTML='<h1>🏆 Tahniah!</h1><h2>Markah: '+score+'/5</h2><button onclick="location.reload()">Main Lagi</button>';
   cakap('Tahniah. Permainan tamat.');
 }else load();
}
load();
</script>
</body>
</html>
